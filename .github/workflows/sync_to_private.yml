name: Sync to Private Repo

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Private Repo
        env:
          MY_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          REMOTE_REPO="https://x-access-token:${MY_TOKEN}@github.com/sorexq/rx-pages.git"

          git push --force "$REMOTE_REPO" HEAD:master
